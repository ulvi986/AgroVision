<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroVision Portal</title>

  <style>
    :root {
      --green: #19c37d;
      --green-dark: #0f9d63;
      --sidebar: #171717;
      --sidebar-hover: #2a2a2a;
      --sidebar-border: #2f2f2f;
      --sidebar-text: #ececec;
      --sidebar-muted: #9b9b9b;
      --bg: #ffffff;
      --text: #0d0d0d;
      --muted: #6e6e80;
      --border: #e5e5e5;
      --assistant-bg: #f7f7f8;
      --user-bg: #19c37d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Söhne", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    .app {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    /* ---------- Sidebar (ChatGPT-style dark rail) ---------- */
    .sidebar {
      background: var(--sidebar);
      color: var(--sidebar-text);
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px 16px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--green), #0f9d63);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--sidebar-text);
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .sidebar .subtitle {
      color: var(--sidebar-muted);
    }

    .side-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--sidebar-muted);
      padding: 0 4px;
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--sidebar-border);
      background: #2a2a2a;
      color: var(--sidebar-text);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    select:hover { background: var(--sidebar-hover); }
    select:focus { border-color: var(--green); }
    select option { background: #2a2a2a; color: var(--sidebar-text); }

    .parcel-info {
      margin-top: 4px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #212121;
      border: 1px solid var(--sidebar-border);
    }

    .parcel-info p {
      font-size: 12.5px;
      margin-bottom: 6px;
      color: var(--sidebar-muted);
      line-height: 1.4;
    }

    .parcel-info p:last-child { margin-bottom: 0; }

    .parcel-info strong {
      color: var(--sidebar-text);
      font-weight: 600;
    }

    /* ---------- Chat area ---------- */
    .chat-card {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      overflow: hidden;
    }

    .chat-header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }

    .chat-header h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .chat-header .subtitle {
      display: none;
    }

    .status {
      font-size: 12px;
      color: var(--green-dark);
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    /* Conversation lives in a centered, fixed-width column */
    .messages {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 28px max(20px, calc((100% - 768px) / 2)) 48px;
    }

    .message {
      font-size: 15px;
      line-height: 1.7;
      word-wrap: break-word;
    }

    /* User: rounded grey bubble hugging the right edge */
    .message.user {
      align-self: flex-end;
      max-width: 80%;
      margin: 14px 0 4px;
      padding: 11px 16px;
      background: #f0f0f0;
      border-radius: 20px;
      border-top-right-radius: 6px;
    }

    .message.user .meta { display: none; }

    /* Assistant: plain text on white, full column width */
    .message.assistant {
      align-self: stretch;
      max-width: 100%;
      padding: 6px 2px 16px;
    }

    .message ul {
      margin: 8px 0;
      padding-left: 22px;
    }

    .message li { margin: 4px 0; }

    .message code {
      background: rgba(0, 0, 0, 0.06);
      padding: 2px 6px;
      border-radius: 5px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .message pre {
      background: #0d0d0d;
      color: #f7f7f8;
      padding: 14px 16px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 10px 0;
      width: 100%;
    }

    .message pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .meta {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ---------- Composer (rounded input box, send inside) ---------- */
    .composer {
      padding: 12px 24px 22px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .upload-box {
      width: 100%;
      max-width: 768px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      padding: 8px 14px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: var(--assistant-bg);
    }

    .upload-box input { display: none; }

    .upload-label {
      cursor: pointer;
      color: var(--green-dark);
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }

    .file-name {
      font-size: 12.5px;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .clear-btn {
      border: none;
      background: transparent;
      color: #b91c1c;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .input-row {
      width: 100%;
      max-width: 768px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 10px 10px 18px;
      border: 1px solid var(--border);
      border-radius: 26px;
      background: var(--bg);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-row:focus-within {
      border-color: #c4c4c4;
      box-shadow: 0 2px 18px rgba(0, 0, 0, 0.1);
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 24px;
      max-height: 200px;
      padding: 8px 0;
      border: none;
      background: transparent;
      font-size: 15px;
      line-height: 1.5;
      outline: none;
      color: var(--text);
    }

    button.send {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border: none;
      border-radius: 50%;
      background: var(--text);
      color: #fff;
      font-size: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s, opacity 0.2s;
    }

    button.send::before {
      content: "↑";
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    button.send:hover { background: #2f2f2f; }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    /* ---------- Feedback card ---------- */
    .feedback-card {
      align-self: flex-start;
      max-width: 440px;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-top: 8px;
    }

    .feedback-card .fb-rating {
      display: flex;
      gap: 8px;
      margin: 10px 0;
    }

    .feedback-card .fb-btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.15s;
    }

    .feedback-card .fb-btn:hover { border-color: var(--green); }

    .feedback-card .fb-btn.selected {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .feedback-card .fb-comment {
      width: 100%;
      max-width: 480px;
      min-height: 56px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      outline: none;
      margin-bottom: 8px;
    }

    .feedback-card .fb-comment:focus { border-color: var(--green); }

    .feedback-card .fb-send {
      border: none;
      border-radius: 10px;
      background: var(--text);
      color: #fff;
      font-weight: 600;
      padding: 9px 18px;
      cursor: pointer;
    }

    .feedback-card .fb-send:hover { background: #2f2f2f; }
    .feedback-card .fb-send:disabled { opacity: 0.6; cursor: default; }

    .feedback-card .fb-status {
      font-size: 13px;
      color: var(--green-dark);
      margin-top: 8px;
      min-height: 16px;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-4px); }
    }

    /* Scrollbar styling */
    .messages::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-thumb {
      background: #d9d9e3;
      border-radius: 4px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 4px;
    }

    @media (max-width: 850px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
      }

      .sidebar .brand { padding: 4px; }
      .side-section { flex: 1; min-width: 140px; }
      .parcel-info { display: none; }

      .chat-card { height: auto; }
      .message { padding: 16px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">Ag</div>
        <div>
          <h1>AgroVision</h1>
          <p class="subtitle">Field intelligence assistant</p>
        </div>
      </div>

      <div class="side-section">
        <label for="personaSelect">Cavab rejimi</label>
        <select id="personaSelect">
          <option value="default">Adi</option>
          <option value="agronomist">Professional aqronom</option>
          <option value="farmer">Adi kəndli</option>
        </select>
      </div>

      <div class="side-section">
        <label for="parcelSelect">Active Tracking Area</label>
        <select id="parcelSelect"></select>
      </div>

      <div class="parcel-info" id="parcelInfo"></div>
    </aside>

    <section class="chat-card">
      <div class="chat-header">
        <div>
          <h2>Agronomy Assistant</h2>
          <p class="subtitle">Ask about crop health, NDVI, irrigation, disease risk, or satellite imagery.</p>
        </div>
        <div class="status">Online</div>
      </div>

      <div class="messages" id="messages">
        <div class="message assistant">
          <span class="meta">Assistant</span>
          Welcome. Select a parcel, upload imagery if needed, and ask your agronomy question.
        </div>
      </div>

      <form class="composer" id="chatForm">
        <div class="upload-box">
          <label class="upload-label" for="fileInput">+ Attach field image</label>
          <span class="file-name" id="fileName">No file selected</span>
          <button type="button" class="clear-btn" id="clearFile">Clear</button>
          <input type="file" id="fileInput" accept="image/*,.tif,.tiff,.csv,.pdf" />
        </div>

        <div class="input-row">
          <textarea id="messageInput" placeholder="Message AgroVision…" rows="1"></textarea>
          <button class="send" type="submit">Send</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    // Areas are no longer hard-coded here. They are loaded from the backend
    // (/areas), which reads database.json — the single source of truth shared
    // with the chat endpoint. Editing database.json updates this list too.
    let parcels = [];

    const parcelSelect = document.getElementById("parcelSelect");
    const personaSelect = document.getElementById("personaSelect");
    const parcelInfo = document.getElementById("parcelInfo");
    const messages = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const clearFile = document.getElementById("clearFile");

    let selectedFile = null;

    // A fresh session id is generated on every page load, so reloading the page
    // starts a brand-new conversation with its own isolated history on the
    // backend (no context bleeding between separate chats).
    const sessionId = (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : `sess-${Date.now()}-${Math.random().toString(36).slice(2)}`;

    // Build the dropdown from whatever areas the backend returned.
    function populateParcelSelect() {
      parcelSelect.innerHTML = "";

      const noneOption = document.createElement("option");
      noneOption.value = "";
      noneOption.textContent = "No tracking area (optional)";
      parcelSelect.appendChild(noneOption);

      parcels.forEach(parcel => {
        const option = document.createElement("option");
        option.value = parcel.area_id;
        option.textContent = `${parcel.area_name} — ${parcel.current_crop}`;
        parcelSelect.appendChild(option);
      });

      // Default to no selection so picking a field is not mandatory
      parcelSelect.value = "";
    }

    // Pull the saved areas from the backend (database.json) and fill the menu.
    async function loadParcels() {
      try {
        const res = await fetch("/areas");
        const data = await res.json();
        parcels = data.areas || [];
      } catch (err) {
        console.error("Could not load areas from backend:", err);
        parcels = [];
      }
      populateParcelSelect();
      renderParcelInfo();
    }

    function getActiveParcel() {
      return parcels.find(parcel => parcel.area_id === parcelSelect.value) || null;
    }

    function renderParcelInfo() {
      const parcel = getActiveParcel();

      if (!parcel) {
        parcelInfo.innerHTML = `
          <p>No tracking area selected.</p>
          <p class="subtitle">You can chat without choosing a field, or pick one above for parcel-specific context.</p>
        `;
        return;
      }

      parcelInfo.innerHTML = `
        <p><strong>Area ID:</strong> ${parcel.area_id}</p>
        <p><strong>Parcel:</strong> ${parcel.area_name}</p>
        <p><strong>Crop:</strong> ${parcel.current_crop}</p>
        <p><strong>Average NDVI:</strong> ${parcel.average_ndvi}</p>
        <p><strong>Average NDWI:</strong> ${parcel.average_ndwi}</p>
      `;
    }

    function formatMarkdown(text) {
      // Convert Gemini's Markdown into safe HTML so it doesn't show raw ** ** etc.
      let html = String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      const codeBlocks = [];
      // Fenced code blocks ```...```
      html = html.replace(/```([\s\S]*?)```/g, (m, code) => {
        codeBlocks.push(`<pre><code>${code.replace(/^\n+|\n+$/g, "")}</code></pre>`);
        return `@@CB${codeBlocks.length - 1}@@`;
      });

      html = html
        // Headings (#, ##, ###) at line start
        .replace(/^#{1,6}\s+(.*)$/gm, "<strong>$1</strong>")
        // Bold: **text** or __text__
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/__([^_]+)__/g, "<strong>$1</strong>")
        // Italic: *text* or _text_
        .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>")
        .replace(/(^|[^_])_([^_\n]+)_/g, "$1<em>$2</em>")
        // Inline code: `code`
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        // Bullet list items (-, *, •) at line start
        .replace(/^\s*[-*•]\s+(.*)$/gm, "<li>$1</li>");

      // Wrap consecutive <li> in <ul>
      html = html.replace(/(?:<li>.*?<\/li>\s*)+/g, (m) => `<ul>${m}</ul>`);

      // Newlines -> <br> (but not around block elements)
      html = html.replace(/\n/g, "<br>");
      html = html.replace(/<br>\s*(<\/?(?:ul|li|pre)>)/g, "$1");
      html = html.replace(/(<\/?(?:ul|li|pre)>)\s*<br>/g, "$1");

      // Restore code blocks
      html = html.replace(/@@CB(\d+)@@/g, (m, i) => codeBlocks[Number(i)]);

      return html;
    }

    function addMessage(role, text) {
      const bubble = document.createElement("div");
      bubble.className = `message ${role}`;
      bubble.innerHTML = `
        <span class="meta">${role === "user" ? "User" : "Assistant"}</span>
        ${text}
      `;
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
      return bubble;
    }

    function showTyping() {
      return addMessage("assistant", `
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      `);
    }

    // Ask for feedback once, after this many assistant replies, then never again.
    const FEEDBACK_AFTER = 5;
    let assistantReplyCount = 0;
    let feedbackAsked = false;
    let feedbackActive = false;

    function showFeedbackPrompt() {
      if (feedbackActive) return;
      feedbackActive = true;

      const card = document.createElement("div");
      card.className = "message assistant feedback-card";
      card.innerHTML = `
        <span class="meta">Feedback</span>
        <div>Bu cavablar necə oldu? Rəyini bizimlə bölüş 🙏</div>
        <div class="fb-rating">
          <button type="button" class="fb-btn" data-rating="👍 Good">👍 Yaxşı</button>
          <button type="button" class="fb-btn" data-rating="👎 Bad">👎 Pis</button>
        </div>
        <textarea class="fb-comment" placeholder="İstəsən şərh yaz (istəyə bağlı)..."></textarea>
        <div><button type="button" class="fb-send">Göndər</button></div>
        <div class="fb-status"></div>
      `;
      messages.appendChild(card);
      messages.scrollTop = messages.scrollHeight;

      let chosenRating = "";
      const ratingBtns = card.querySelectorAll(".fb-btn");
      ratingBtns.forEach((btn) =>
        btn.addEventListener("click", () => {
          chosenRating = btn.dataset.rating;
          ratingBtns.forEach((b) => b.classList.remove("selected"));
          btn.classList.add("selected");
        })
      );

      const statusEl = card.querySelector(".fb-status");
      const sendBtn = card.querySelector(".fb-send");

      sendBtn.addEventListener("click", async () => {
        const comment = card.querySelector(".fb-comment").value.trim();
        if (!chosenRating && !comment) {
          statusEl.textContent = "Zəhmət olmasa rəy seç və ya şərh yaz.";
          return;
        }

        sendBtn.disabled = true;
        statusEl.textContent = "Göndərilir...";

        const fd = new FormData();
        fd.append("rating", chosenRating);
        fd.append("comment", comment);
        fd.append("session_id", sessionId);

        try {
          const r = await fetch("/feedback", { method: "POST", body: fd });
          const d = await r.json();
          if (d.ok) {
            statusEl.textContent = "Təşəkkürlər! Rəyin qeydə alındı ✅";
            card.querySelector(".fb-rating").style.display = "none";
            card.querySelector(".fb-comment").style.display = "none";
            sendBtn.style.display = "none";
          } else {
            statusEl.textContent = "Xəta: " + (d.error || "göndərilə bilmədi");
            sendBtn.disabled = false;
          }
        } catch (err) {
          statusEl.textContent = "Server xətası, yenidən cəhd et.";
          sendBtn.disabled = false;
          console.error(err);
        }

        feedbackActive = false;
      });
    }

    parcelSelect.addEventListener("change", renderParcelInfo);

    fileInput.addEventListener("change", () => {
      selectedFile = fileInput.files[0] || null;
      fileName.textContent = selectedFile ? selectedFile.name : "No file selected";
    });

    clearFile.addEventListener("click", () => {
      selectedFile = null;
      fileInput.value = "";
      fileName.textContent = "No file selected";
    });

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = messageInput.value.trim();
      // Allow sending an image on its own, without any text message.
      if (!message && !selectedFile) return;

      const activeParcel = getActiveParcel();

      const attached = selectedFile
        ? `<small>📎 Attached: ${selectedFile.name}</small>`
        : "";
      addMessage(
        "user",
        [message, attached].filter(Boolean).join("<br><br>")
      );

      messageInput.value = "";

      const typingBubble = showTyping();

      const formData = new FormData();
      formData.append("message", message);
      formData.append("area_id", activeParcel ? activeParcel.area_id : "");
      formData.append("parcel_context", activeParcel ? JSON.stringify(activeParcel) : "");
      formData.append("persona", personaSelect.value);
      formData.append("session_id", sessionId);

      if (selectedFile) {
        formData.append("file", selectedFile);
      }

      /*
        Backend endpoint example:
        POST /api/chat

        Replace mock response below with:

        const response = await fetch("/api/chat", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
      */

        try {
            const response = await fetch("/chat", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        typingBubble.remove();
        addMessage("assistant", formatMarkdown(data.response));

        // Ask for feedback only once, after FEEDBACK_AFTER replies.
        assistantReplyCount++;
        if (!feedbackAsked && assistantReplyCount >= FEEDBACK_AFTER) {
          feedbackAsked = true;
          showFeedbackPrompt();
        }

      } catch (error) {
        typingBubble.remove();
        addMessage("assistant", "Server error oldu. Flask işləyir yoxla.");
        console.error(error);
      }
    });

    loadParcels();
  </script>
</body>
</html>
